aid: basel-iii
name: Basel III
description: >-
  Basel III is a comprehensive global regulatory framework developed by the Basel Committee
  on Banking Supervision (BCBS) in response to the 2007-2008 financial crisis. It strengthens
  bank capital requirements by requiring higher quality and quantity of capital (CET1, Tier 1,
  Total Capital), introduces new liquidity standards (LCR and NSFR), adds a leverage ratio
  backstop, and includes countercyclical capital buffers and G-SIB surcharges. Basel III
  implementation in the EU/UK is delivered via CRD IV/V and CRR regulations. The final
  Basel III package (sometimes called Basel IV) addresses output floor and credit risk model
  constraints introduced in 2017.
